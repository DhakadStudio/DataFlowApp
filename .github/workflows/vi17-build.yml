name: Build Vi-17 Android

on:
  push:
    branches: [ master, main, develop ]
    paths:
      - 'Vi17-Android/**'
  pull_request:
    branches: [ master, main, develop ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GRADLE_USER_HOME: ${{ github.workspace }}/gradle-home

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Cache Gradle & Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
            ${{ github.workspace }}/gradle-home
          key: ${{ runner.os }}-gradle-${{ hashFiles('Vi17-Android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Make gradlew executable
        run: chmod +x Vi17-Android/gradlew
      
      - name: Build Debug APK
        run: cd Vi17-Android && ./gradlew assembleDebug --stacktrace
      
      - name: Build Release APK
        run: cd Vi17-Android && ./gradlew assembleRelease --stacktrace
        continue-on-error: true
      
      - name: Run Lint
        run: cd Vi17-Android && ./gradlew lint --stacktrace
        continue-on-error: true
      
      - name: Run Unit Tests
        run: cd Vi17-Android && ./gradlew test --stacktrace
        continue-on-error: true
      
      - name: Find APKs
        run: find Vi17-Android -name "*.apk" -type f
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: Vi17-Android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-release
          path: Vi17-Android/app/build/outputs/apk/release/*.apk
          retention-days: 30
